<html>
	<head>
	    <title>Register Page</title>
  	</head>
	<body>
		<label for="fname">Enter First Name><input type="text" id="fname"> <br><br>
		<label for="lpass">Enter Last name><input type="text" id="lname"> <br><br>
		<label for="uname">Enter UserName><input type="text" id="uname"> <br><br>
		<label for="email">Enter Email><input type="email" id="email"> <br><br>
		<p>Select Gender:</p>
			
			<input type="radio" id="male" name="gender" value="male">
			<label for="male">Male</label><br>

			<input type="radio" id="female" name="gender" value="female">
			<label for="female">Female</label><br>

			<input type="radio" id="other" name="gender" value="other">
			<label for="other">Other</label><br>
		<p>Select language:</p>
			
			<input type="checkbox" id="marathi" name="language" value="marathi" >
			<label for="marathi">Male</label><br>
			<input type="checkbox" id="english" name="language" value="english">
			<label for="female">Female</label><br>

			<input type="checkbox" id="hindi" name="language" value="hindi">
			<label for="other">Other</label><br>
		 <br>
		<label for="pass">Enter Password><input type="pass" id="pass"> <br><br>
		<label for="repass">Enter Re-enter password><input type="pass" id="repass"> <br><br>
		<button>Register</button>

	</body>


</html>
