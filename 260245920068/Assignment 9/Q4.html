<!-- JQuery
1)  create application for $().load()
   display content of another html page in current page 
 -->


 <!DOCTYPE html>
 <html lang="en">
 <head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    
   <script type="text/javascript" language="JavaScript">
       $(document).ready (function(){
         $("#button").click(function(event){
            $("#stage").load('Heading.html');
          });

      });

   </script>
 </head>
 <body>
   
   <p id="p1"> Enter the button</p>
   <div id="stage" style="background-color:rgb(135, 167, 194);">
        STAGE
    </div>

    <input type="button" id="button" value="Load Data" />
 </body>
 </html>
