<!DOCTYPE html>
<html>
<head>
<title>Star Pattern</title>

<script>

function showPattern()
{
    for(let i = 3; i >= 1; i--)
    {
        let row = "";

        for(let j = 1; j <= i; j++)
        {
            row = row + "* ";
        }

        console.log(row);
    }
}

</script>

</head>

<body>

<h2>Star Pattern</h2>

<button onclick="showPattern()">Show Pattern</button>



</body>
</html>
