<!DOCTYPE html>
<html>
<head>
    <title>Factorial Calculator</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<label>Enter a number:</label>
<input type="number" id="num">

<p id="result"></p>

<script>
$(document).ready(function(){

    $("#num").change(function(){
        let n = parseInt($(this).val());
        let fact = 1;

        if(n < 0){
            $("#result").text("Factorial not defined for negative numbers");
            return;
        }

        for(let i = 1; i <= n; i++){
            fact *= i;
        }

        $("#result").text("Factorial: " + fact);
    });

});
</script>

</body>
</html>
