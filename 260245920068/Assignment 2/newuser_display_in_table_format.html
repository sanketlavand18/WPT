<!DOCTYPE html>

<html>
<head>
<title>NewUser</title>

<script>
function displayData()
{
    let fname = document.getElementById("first_name").value;
    let lname = document.getElementById("last_name").value;
    let uname = document.getElementById("user_name").value;
    let email = document.getElementById("email_id").value;

    let gender = document.querySelector('input[name="Gender"]:checked');
    gender = gender ? gender.value : "";

    let languages = [];
    let checks = document.querySelectorAll('input[type="checkbox"]:checked');
    for(let i=0;i<checks.length;i++)
    {
        languages.push(checks[i].value);
    }

    let table =
    "<table border='1' cellpadding='8'>" +
    "<tr><th>Field</th><th>Value</th></tr>" +
    "<tr><td>First Name</td><td>"+fname+"</td></tr>" +
    "<tr><td>Last Name</td><td>"+lname+"</td></tr>" +
    "<tr><td>User Name</td><td>"+uname+"</td></tr>" +
    "<tr><td>Gender</td><td>"+gender+"</td></tr>" +
    "<tr><td>Languages</td><td>"+languages.join(", ")+"</td></tr>" +
    "<tr><td>Email</td><td>"+email+"</td></tr>" +
    "</table>";

    document.getElementById("result").innerHTML = table;

    return false;
}
</script>

</head>

<body>

<form onsubmit="return displayData()">

<label>Enter First Name</label> <input type="text" id="first_name"><br><br>

<label>Enter Last Name</label> <input type="text" id="last_name"><br><br>

<label>Enter User Name</label> <input type="text" id="user_name"><br><br>

<label>Select Gender</label><br>

<label><input type="radio" name="Gender" value="Male"> Male</label><br> <label><input type="radio" name="Gender" value="Female"> Female</label><br> <label><input type="radio" name="Gender" value="Other"> Other</label><br><br>

<label>Known Languages</label><br>

<label><input type="checkbox" value="English"> English</label><br> <label><input type="checkbox" value="Hindi"> Hindi</label><br> <label><input type="checkbox" value="Marathi"> Marathi</label><br><br>

<label>Enter Email</label> <input type="text" id="email_id"><br><br>

<label>Enter Password</label> <input type="password" id="password"><br><br>

<label>ReEnter Password</label> <input type="password" id="repassword"><br><br>

<input type="submit" value="Register">

</form>

<br><br>

<div id="result"></div>

</body>
</html>
