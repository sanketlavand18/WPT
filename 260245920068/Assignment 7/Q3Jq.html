<!DOCTYPE html>
<html>
<head>
    <title>jQuery</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        $(document).ready(function(){
            $("#button").click(function(){
                $("#p1").text("hello");
                $("#p2").html("<i>hello</i>");
                $("#p3").html("<u>hello</u>");
            });
        });
    </script>
</head>

<body>

<button id="button">OK</button>

<p id="p1"></p>
<p id="p2"></p>
<p id="p3"></p>

</body>
</html>
