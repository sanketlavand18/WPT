<!DOCTYPE html>
<html>
<head>
<title>Table Program</title>

<script>

var number = 5;   

function showTable()
{
    for(var i = 1; i <= 10; i++)
    {
        console.log(number + " x " + i + " = " + (number * i));
    }
}

</script>

</head>

<body>

<h2>Multiplication Table</h2>

<button onclick="showTable()">Show Table</button>


</body>
</html>
