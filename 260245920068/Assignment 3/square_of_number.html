<!DOCTYPE html>
<html>
<head>
<title>Square Calculator</title>

<script>
function findSquare()
{
    let num = document.getElementById("number").value;
    let square = num * num;

    document.getElementById("result").innerHTML = "Square = " + square;
}
</script>

</head>

<body>

<h2>Square of a Number</h2>

Enter Number:
<input type="number" id="number" required>

<br><br>

<button onclick="findSquare()">Calculate Square</button>

<p id="result"></p>

</body>
</html>
