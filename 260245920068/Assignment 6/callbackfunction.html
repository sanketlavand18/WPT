<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body onload="start()">
    <h1 >Call back function</h1>
    <p id="msg"></p>


    <script>
        function show()
        {
            document.getElementById("msg").innerHTML="Ramayan";
        }

        function start(){
            setInterval(show,1000);
           setTimeout(show,4000);
           
        }
    </script>
</body>
</html>
