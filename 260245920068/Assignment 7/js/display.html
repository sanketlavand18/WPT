<html>



<body>


    <p id="p1" style="display: block;"> Paragraph Data </p>

    <button id="b1" onclick="hide()">Hide </button>

    <button id="b2" onclick="show()">Show</button>

    <script>
        function hide() {
            document.getElementById("p1").style.display = "none";
        }

        function show() {
            document.getElementById("p1").style.display = "block";
        }

    </script>


</body>




</html>
